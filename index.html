<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển: Baorcantien</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .card-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        
        /* Thiết kế giống ảnh mẫu của bạn */
        .card { width: 350px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 14px; }
        
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div style="background: #fff; padding: 15px; border-radius: 10px; display: flex; gap: 15px; margin-bottom: 20px;">
        <strong>BAORCANTIEN</strong> | <a href="#">Trang chủ</a> | <a href="#">Tạo việc</a> | <a href="#">Duyệt việc</a>
    </div>

    <h2>Quản lý nhiệm vụ</h2>
    <input type="text" id="name" placeholder="Tên việc...">
    <input type="number" id="price" placeholder="Số tiền...">
    <button onclick="addTask()">Tạo Nhiệm Vụ</button>

    <h3>Danh sách chờ duyệt:</h3>
    <div id="adminList" class="card-container"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://viecnha-94d10-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('Baorcantien');

        function addTask() {
            let n = document.getElementById('name').value;
            let p = document.getElementById('price').value;
            if(n && p) db.push({ name: n, price: p, status: 'new' });
        }

        db.on('value', (s) => {
            let html = '';
            s.forEach(c => {
                let t = c.val();
                if(t.status === 'pending') {
                    html += `
                    <div class="card">
                        <div class="card-header"><strong>${t.name}</strong></div>
                        <div class="card-grid">
                            <span>Giá: ${t.price} VNĐ</span>
                            <span>Trạng thái: Đang chờ</span>
                        </div>
                        <button style="width:100%; margin-top:10px; background:#28a745;" onclick="db.child('${c.key}').update({status: 'done'})">Duyệt việc ✅</button>
                    </div>`;
                }
            });
            document.getElementById('adminList').innerHTML = html || "<p>Chưa có việc nào cần duyệt.</p>";
        });
    </script>
</body>
</html>
